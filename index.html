<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dimuthu Livera — Portfolio</title>

  <script>
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  </script>

  <link rel="preload" href="fonts/inter-v20-latin/inter-v20-latin-500.woff2" as="font" type="font/woff2" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F1115;
      --surface: #16191F;
      --border: #262A33;
      --text: #E8EAED;
      --text-muted: #9098A6;
      --accent: #7C5CFF;
    }
    [data-theme="light"] {
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --border: #E5E5E5;
      --text: #0F0F0F;
      --text-muted: #6B7280;
      --accent: #5B3FE0;
    }
    body { background: var(--bg); color: var(--text); }
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: 72px;
    }
  </style>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-container">

    <a href="#hero" class="nav-logo">
      <span class="logo-bracket">&lt;</span>Dimuthu Livera<span class="logo-bracket">/&gt;</span>
    </a>

    <ul class="nav-links" id="navLinks">
      <li><a href="#hero" class="nav-link active" data-section="hero">Home</a></li>
      <li><a href="#about" class="nav-link" data-section="about">About</a></li>
      <li><a href="#skills" class="nav-link" data-section="skills">Skills</a></li>
      <li><a href="#experience" class="nav-link" data-section="experience">Experience</a></li>
      <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
      <span class="nav-indicator" id="navIndicator"></span>
    </ul>

    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
      </button>

      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

  </div>

  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <a href="#hero" class="mobile-link active">Home</a>
    <a href="#about" class="mobile-link">About</a>
    <a href="#skills" class="mobile-link">Skills</a>
    <a href="#experience" class="mobile-link">Experience</a>
    <a href="#contact" class="mobile-link">Contact</a>
  </div>
</nav>

<main>
  <section id="hero" style="min-height: 100vh"></section>
  <section id="about" style="min-height: 100vh"></section>
  <section id="skills" style="min-height: 100vh"></section>
  <section id="experience" style="min-height: 100vh"></section>
  <section id="contact" style="min-height: 100vh"></section>
</main>

<script src="script.js" defer></script>
</body>
</html>
